# ================================================================
# OMEGA-3 Data Catalog Stack
#   PostgreSQL 16        source data + metadata (airflow_db, openmetadata_db)
#   OpenSearch 2.19.1    search backend for OpenMetadata
#   OpenMetadata 1.12.5  Data Catalog UI & API (:8585)
#   Airflow 3.0.2        orchestration (api-server :8080, scheduler, dag-processor)
#   dbt 1.9.4            runs inside Airflow container, docs on :8090
# ================================================================

x-airflow-common:
  &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  image: omega3/airflow:3.0.2
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__AUTH_MANAGER: airflow.api_fastapi.auth.managers.simple.simple_auth_manager.SimpleAuthManager
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_ALL_ADMINS: "true"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow_secret_2024@postgres:5432/airflow_db
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLt0jP6bEY=}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__BASE_URL: "http://localhost:8080"
    AIRFLOW__API__HOST: "0.0.0.0"
    AIRFLOW__API__PORT: "8080"
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_JWT_SECRET:-omega3-jwt-dev-secret-change-me-46bkj}
    AIRFLOW__LOGGING__LOGGING_LEVEL: INFO
    # OpenLineage → OpenMetadata
    AIRFLOW__OPENLINEAGE__TRANSPORT: '{"type":"http","url":"http://openmetadata-server:8585/api/v1/lineage/openlineage"}'
    AIRFLOW__OPENLINEAGE__NAMESPACE: "omega3"
    # dbt
    DBT_PROFILES_DIR: /opt/airflow/dbt
    DBT_PROJECT_DIR: /opt/airflow/dbt
    DBT_THREADS: "8"
    # OpenMetadata (used by ingestion scripts)
    OPENMETADATA_SERVER_URL: "http://openmetadata-server:8585/api"
    OPENMETADATA_AUTH_PROVIDER: "openmetadata"
    # Source DB for dbt
    DEMO_DB_HOST: postgres
    DEMO_DB_PORT: "5432"
    DEMO_DB_NAME: demo
    DEMO_DB_USER: demo_user
    DEMO_DB_PASSWORD: demo_secret_2024
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/plugins:/opt/airflow/plugins
    - ./airflow/scripts:/opt/airflow/scripts
    - ./dbt:/opt/airflow/dbt
    - ./ingestion:/opt/airflow/ingestion
    - airflow_logs:/opt/airflow/logs
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - omega3-net

services:

  # ============================================================
  # POSTGRES 16 — source (demo) + airflow_db + openmetadata_db
  # ============================================================
  postgres:
    image: postgres:16
    container_name: omega3-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_secret_2024
      POSTGRES_DB: postgres
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=512MB"
      - "-c"
      - "work_mem=32MB"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init-db.sql
      - /home/daurena2609/dumps:/dumps:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - omega3-net
    restart: unless-stopped

  # ============================================================
  # OPENSEARCH 2.19.1 — search backend for OpenMetadata
  # ============================================================
  opensearch:
    image: opensearchproject/opensearch:2.19.1
    container_name: omega3-opensearch
    environment:
      - cluster.name=omega3-cluster
      - node.name=omega3-os-node
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - OPENSEARCH_JAVA_OPTS=${OPENSEARCH_JAVA_OPTS:--Xms1g -Xmx1g}
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - DISABLE_SECURITY_PLUGIN=true
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 30s
      timeout: 15s
      retries: 20
      start_period: 90s
    networks:
      - omega3-net
    restart: unless-stopped
    ulimits:
      memlock: {soft: -1, hard: -1}
      nofile:  {soft: 65536, hard: 65536}

  # ============================================================
  # OPENMETADATA migrate — runs once, then exits
  # ============================================================
  om-migrate:
    image: openmetadata/server:1.12.5
    container_name: omega3-om-migrate
    command: "./bootstrap/openmetadata-ops.sh migrate"
    environment:
      &om-common-env
      OPENMETADATA_CLUSTER_NAME: omega3
      SERVER_PORT: "8585"
      SERVER_ADMIN_PORT: "8586"
      LOG_LEVEL: INFO
      DB_DRIVER_CLASS: "org.postgresql.Driver"
      DB_SCHEME: "postgresql"
      DB_USE_SSL: "false"
      DB_PARAMS: "allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC"
      DB_USER: openmetadata
      DB_USER_PASSWORD: openmetadata_secret_2024
      DB_HOST: postgres
      DB_PORT: "5432"
      OM_DATABASE: openmetadata_db
      SEARCH_TYPE: opensearch
      ELASTICSEARCH_HOST: opensearch
      ELASTICSEARCH_PORT: "9200"
      ELASTICSEARCH_SCHEME: http
      ELASTICSEARCH_USER: ""
      ELASTICSEARCH_PASSWORD: ""
      SERVER_HOST_API_URL: "http://openmetadata-server:8585/api"
      PIPELINE_SERVICE_CLIENT_ENDPOINT: "http://airflow-apiserver:8080"
      AIRFLOW_HOST: "http://airflow-apiserver:8080"
      AIRFLOW_USERNAME: "admin"
      AIRFLOW_PASSWORD: "admin"
      AUTHENTICATION_PROVIDER: basic
      AUTHORIZER_CLASS_NAME: "org.openmetadata.service.security.DefaultAuthorizer"
      AUTHORIZER_REQUEST_FILTER: "org.openmetadata.service.security.JwtFilter"
      AUTHORIZER_ADMIN_PRINCIPALS: "[admin]"
      AUTHORIZER_PRINCIPAL_DOMAIN: "open-metadata.org"
      JWT_ISSUER: "open-metadata.org"
      JWT_KEY_ID: "Gb389a-9f76-gdjs-a92j-0242bk94356"
    depends_on:
      postgres:    {condition: service_healthy}
      opensearch:  {condition: service_healthy}
    networks:
      - omega3-net

  # ============================================================
  # OPENMETADATA server — Data Catalog UI & API (:8585)
  # ============================================================
  openmetadata-server:
    image: openmetadata/server:1.12.5
    container_name: omega3-openmetadata
    environment:
      <<: *om-common-env
    ports:
      - "8585:8585"
      - "8586:8586"
    depends_on:
      postgres:    {condition: service_healthy}
      opensearch:  {condition: service_healthy}
      om-migrate:  {condition: service_completed_successfully}
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8586/healthcheck || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 20
      start_period: 180s
    networks:
      - omega3-net
    restart: unless-stopped
    volumes:
      - om_data:/opt/openmetadata

  # ============================================================
  # AIRFLOW init — migrate DB + create admin user (runs once)
  # ============================================================
  airflow-init:
    <<: *airflow-common
    container_name: omega3-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -e
        airflow db migrate
        echo "Airflow 3.0 DB migrated. SimpleAuthManager user: admin/admin."
    restart: "no"

  # ============================================================
  # AIRFLOW api-server (UI + REST API, :8080)
  # ============================================================
  airflow-apiserver:
    <<: *airflow-common
    container_name: omega3-airflow-apiserver
    command: api-server
    ports:
      - "8080:8080"
      - "8090:8090"
    depends_on:
      airflow-init: {condition: service_completed_successfully}
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/monitor/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  # ============================================================
  # AIRFLOW scheduler
  # ============================================================
  airflow-scheduler:
    <<: *airflow-common
    container_name: omega3-airflow-scheduler
    command: scheduler
    depends_on:
      airflow-init: {condition: service_completed_successfully}
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname $$(hostname) || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # ============================================================
  # AIRFLOW dag-processor (separate process in 3.0)
  # ============================================================
  airflow-dag-processor:
    <<: *airflow-common
    container_name: omega3-airflow-dag-processor
    command: dag-processor
    depends_on:
      airflow-init: {condition: service_completed_successfully}
    restart: unless-stopped

# ============================================================
# VOLUMES & NETWORKS
# ============================================================
volumes:
  postgres_data:   {name: omega3_postgres_data}
  opensearch_data: {name: omega3_opensearch_data}
  airflow_logs:    {name: omega3_airflow_logs}
  om_data:         {name: omega3_om_data}

networks:
  omega3-net:
    name: omega3-net
    driver: bridge
