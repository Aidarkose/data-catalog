source:
  type: postgres
  serviceName: demo_postgres
  serviceConnection:
    config:
      type: Postgres
      username: postgres
      authType:
        password: postgres_secret_2024
      hostPort: postgres:5432
      database: demo
  sourceConfig:
    config:
      type: DatabaseMetadata
      markDeletedTables: true
      includeTables: true
      includeViews: true
      schemaFilterPattern:
        includes:
          - "^bookings$"
          - "^public_staging$"
          - "^public_marts$"

sink:
  type: metadata-rest
  config: {}

