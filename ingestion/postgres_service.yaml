source:
  type: postgres
  serviceName: demo_postgres
  serviceConnection:
    config:
      type: Postgres
      username: postgres
      authType:
        password: postgres_secret_2024
      hostPort: postgres:5432
      database: demo
  sourceConfig:
    config:
      type: DatabaseMetadata
      markDeletedTables: true
      includeTables: true
      includeViews: true
      schemaFilterPattern:
        includes:
          - "^bookings$"
          - "^public_staging$"
          - "^public_marts$"

sink:
  type: metadata-rest
  config: {}

workflowConfig:
  loggerLevel: INFO
  openMetadataServerConfig:
    hostPort: http://openmetadata-server:8585/api
    authProvider: openmetadata
    securityConfig:
      # Token is injected at runtime by run_om_ingestion.py from $OM_JWT_TOKEN
      jwtToken: "__INJECT_AT_RUNTIME__"
