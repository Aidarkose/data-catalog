source:
  type: dbt
  serviceName: demo_postgres
  sourceConfig:
    config:
      type: DBT
      dbtConfigSource:
        dbtConfigType: local
        dbtCatalogFilePath: /opt/airflow/dbt/target/catalog.json
        dbtManifestFilePath: /opt/airflow/dbt/target/manifest.json
      dbtUpdateDescriptions: true
      includeTags: true
      dbtClassificationName: dbt_tags

sink:
  type: metadata-rest
  config: {}

workflowConfig:
  loggerLevel: INFO
  openMetadataServerConfig:
    hostPort: http://openmetadata-server:8585/api
    authProvider: openmetadata
    securityConfig:
      jwtToken: "__INJECT_AT_RUNTIME__"
